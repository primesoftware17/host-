{q:"Chemical formula of water? / सूत्र?", options:["H2O","CO2","NaCl","O2"], answer:0},

{q:"SI unit of force? / मात्रक?", options:["Newton","Joule","Pascal","Watt"], answer:0},

{q:"Plants prepare food by? / भोजन?", options:["Photosynthesis","Respiration","Digestion","Excretion"], answer:0}

]
},

{
subject:"Social Science",
questions:[

{q:"First President of India? / प्रथम राष्ट्रपति?", options:["Rajendra Prasad","Nehru","Patel","Gandhi"], answer:0},

{q:"Capital of Bihar? / राजधानी?", options:["Patna","Delhi","Ranchi","Lucknow"], answer:0},

{q:"India became independent in? / स्वतंत्रता?", options:["1947","1945","1950","1942"], answer:0},

{q:"Largest democracy in world? / सबसे बड़ा लोकतंत्र?", options:["India","USA","Russia","China"], answer:0},

{q:"Who discovered sea route to India? / समुद्री मार्ग?", options:["Vasco da Gama","Columbus","Cook","Magellan"], answer:0}

]
}

];

let score = 0;

function loadQuiz() {

    const quiz = document.getElementById("quiz");

    const frag = document.createDocumentFragment(); // FAST render buffer

    quizData.forEach((subjectData) => {

        const subjectTitle = document.createElement("h2");
        subjectTitle.className = "subject-title";
        subjectTitle.textContent = subjectData.subject;
        frag.appendChild(subjectTitle);

        subjectData.questions.forEach((item, qIndex) => {

            const div = document.createElement("div");
            div.className = "question";

            // store correct answer directly (FAST access)
            div.dataset.answer = item.answer;
            div.dataset.done = "0";

            const q = document.createElement("h4");
            q.textContent = `${qIndex + 1}. ${item.q}`;
            div.appendChild(q);

            const optionsFrag = document.createDocumentFragment();

            for (let i = 0; i < item.options.length; i++) {

                const opt = document.createElement("div");
                opt.className = "option";

                // store index for instant compare
                opt.dataset.index = i;
                opt.textContent = item.options[i];

                optionsFrag.appendChild(opt);
            }

            div.appendChild(optionsFrag);
            frag.appendChild(div);
        });
    });

    quiz.appendChild(frag);

    // ⚡ SINGLE GLOBAL LISTENER (FASTEST POSSIBLE)
    quiz.addEventListener("pointerdown", function (e) {

        const btn = e.target;
        if (!btn.classList.contains("option")) return;

        const qDiv = btn.parentElement;

        if (qDiv.dataset.done === "1") return;
        qDiv.dataset.done = "1";

        const correctIndex = +qDiv.dataset.answer;
        const clickedIndex = +btn.dataset.index;

        const options = qDiv.children; // faster than querySelectorAll

        // mark answer instantly
        if (clickedIndex === correctIndex) {
            btn.classList.add("correct");
            score++;
        } else {
            btn.classList.add("wrong");
        }

        // correct highlight (direct index access - NO querySelectorAll)
        options[correctIndex + 1].classList.add("correct");
        // +1 because first child is <h4>

    });

}

function showScore() {
    document.getElementById("score").textContent = "Your Score: " + score;
}

loadQuiz();
</script>
