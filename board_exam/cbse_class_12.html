<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 12 Stream Wise Quiz</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.quiz-container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    text-align:center;
    color:#333;
}

.section-title{
    background:#222;
    color:white;
    padding:12px;
    margin-top:40px;
    border-radius:5px;
}

.subject-title{
    background:#2196F3;
    color:white;
    padding:10px;
    margin-top:25px;
    border-radius:5px;
}

.question{
    margin-bottom:20px;
    padding:10px;
    border-bottom:1px solid #ccc;
}

.option{
    display:block;
    padding:10px;
    margin:5px 0;
    border:1px solid #ccc;
    border-radius:5px;
    cursor:pointer;
    background:#fafafa;
}

.option:hover{
    background:#eee;
}

.correct{
    background:#4CAF50;
    color:white;
}

.wrong{
    background:#f44336;
    color:white;
}

button{
    padding:12px 25px;
    font-size:18px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:20px;
}

#score{
    margin-top:20px;
    font-size:24px;
    color:#333;
    text-align:center;
}

</style>
</head>

<body>

<div class="quiz-container">

<h1>Class 12 Stream Wise MCQ Quiz</h1>

<div id="quiz"></div>

<button onclick="showScore()">Submit Quiz</button>

<h2 id="score"></h2>

</div>

<script>

const quizData = [

/* ===================== COMPULSORY SUBJECTS ===================== */

{
section:"Compulsory Subjects",
subject:"Hindi",
questions:[

{q:"Who is the poet of 'Atmaparichay'?", options:["Harivansh Rai Bachchan","Nirala","Dinkar","Mahadevi"], answer:0},

{q:"Who wrote 'Bhaktin'?", options:["Mahadevi Verma","Subhadra Kumari","Mannu Bhandari","Krishna Sobti"], answer:0},

{q:"Who wrote 'Kale Megha Pani De'?", options:["Phanishwar Nath Renu","Premchand","Dinkar","Nirala"], answer:0},

{q:"Who is the poet of 'Usha'?", options:["Shamsher Bahadur Singh","Dinkar","Pant","Nirala"], answer:0},

{q:"Who wrote 'Bazaar Darshan'?", options:["Harishankar Parsai","Premchand","Mahadevi","Dinkar"], answer:0}

]
},

{
section:"Compulsory Subjects",
subject:"English",
questions:[

{q:"Who wrote 'The Last Lesson'?", options:["Alphonse Daudet","Robert Frost","Whitman","Mulk Raj Anand"], answer:0},

{q:"Who was Franz?", options:["Student","Teacher","Farmer","Doctor"], answer:0},

{q:"The poem 'My Mother at Sixty Six' is written by?", options:["Kamala Das","Keats","Whitman","Frost"], answer:0},

{q:"What was the lost spring related to?", options:["Child labour","War","Education","Sports"], answer:0},

{q:"Who wrote 'Deep Water'?", options:["William Douglas","Whitman","Daudet","Keats"], answer:0}

]
},

/* ===================== ARTS SECTION ===================== */

{
section:"Arts Section",
subject:"History",
questions:[

{q:"Who wrote Ain-i-Akbari?", options:["Abul Fazl","Akbar","Babur","Badauni"], answer:0},

{q:"Harappa civilization belongs to?", options:["Indus Valley","Vedic","Maurya","Gupta"], answer:0},

{q:"Who founded Mughal Empire?", options:["Babur","Akbar","Humayun","Shah Jahan"], answer:0},

{q:"Who was Mahatma Gandhi?", options:["Freedom fighter","Scientist","Doctor","King"], answer:0},

{q:"In which year India got independence?", options:["1947","1942","1950","1930"], answer:0}

]
},

{
section:"Arts Section",
subject:"Political Science",
questions:[

{q:"UNO stands for?", options:["United Nations Organization","Union National Office","United Office","None"], answer:0},

{q:"Who is called Father of Constitution?", options:["Dr. B.R. Ambedkar","Gandhi","Nehru","Patel"], answer:0},

{q:"Democracy means?", options:["Rule by people","Rule by king","Rule by army","Rule by priest"], answer:0},

{q:"Indian Constitution came into force in?", options:["1950","1947","1942","1960"], answer:0},

{q:"Lok Sabha members are elected for?", options:["5 years","4 years","6 years","2 years"], answer:0}

]
},

{
section:"Arts Section",
subject:"Geography",
questions:[

{q:"Largest continent is?", options:["Asia","Africa","Europe","Australia"], answer:0},

{q:"Ganga river originates from?", options:["Gangotri","Yamunotri","Kedarnath","Badrinath"], answer:0},

{q:"Which soil is best for cotton?", options:["Black soil","Red soil","Alluvial","Laterite"], answer:0},

{q:"India is located in which hemisphere?", options:["Northern","Southern","Western","Eastern"], answer:0},

{q:"Capital of Bihar?", options:["Patna","Delhi","Lucknow","Ranchi"], answer:0}

]
},

/* ===================== COMMERCE SECTION ===================== */

{
section:"Commerce Section",
subject:"Accountancy",
questions:[

{q:"Accounting records?", options:["Financial transactions","Weather","Politics","Sports"], answer:0},

{q:"Debit the receiver means?", options:["Golden rule","Silver rule","Cash rule","Trade rule"], answer:0},

{q:"Journal is called?", options:["Book of original entry","Ledger","Cash book","Balance sheet"], answer:0},

{q:"Balance sheet shows?", options:["Financial position","Profit only","Loss only","Sales"], answer:0},

{q:"Capital means?", options:["Owner investment","Loan","Expense","Sales"], answer:0}

]
},

{
section:"Commerce Section",
subject:"Business Studies",
questions:[

{q:"Management means?", options:["Getting work done","Sleeping","Entertainment","Travel"], answer:0},

{q:"Who is father of management?", options:["F.W. Taylor","Newton","Einstein","Gandhi"], answer:0},

{q:"Planning is?", options:["Primary function","Secondary","No function","Last function"], answer:0},

{q:"Business aims at?", options:["Profit","Loss","Fight","War"], answer:0},

{q:"Marketing helps in?", options:["Selling goods","Farming","Teaching","Driving"], answer:0}

]
},

{
section:"Commerce Section",
subject:"Economics",
questions:[

{q:"Economics studies?", options:["Human behaviour","Animals","Machines","Water"], answer:0},

{q:"Demand means?", options:["Need backed by ability","Only wish","Only money","Only goods"], answer:0},

{q:"Inflation means?", options:["Rise in prices","Fall in prices","Rain","Profit"], answer:0},

{q:"National income means?", options:["Total income","Tax","Import","Export"], answer:0},

{q:"RBI is?", options:["Central bank","Private bank","Foreign bank","None"], answer:0}

]
},

/* ===================== SCIENCE SECTION ===================== */

{
section:"Science Section",
subject:"Physics",
questions:[

{q:"SI unit of force?", options:["Newton","Joule","Pascal","Watt"], answer:0},

{q:"Speed of light is?", options:["3×10^8 m/s","3×10^6","3×10^5","3×10^2"], answer:0},

{q:"Who discovered gravity?", options:["Newton","Einstein","Galileo","Bohr"], answer:0},

{q:"Electric current measured by?", options:["Ammeter","Voltmeter","Barometer","Thermometer"], answer:0},

{q:"Unit of power?", options:["Watt","Newton","Joule","Ampere"], answer:0}

]
},

{
section:"Science Section",
subject:"Chemistry",
questions:[

{q:"Organic chemistry studies?", options:["Carbon compounds","Metals","Water","Gas"], answer:0},

{q:"pH value of acid is?", options:["Less than 7","More than 7","7","14"], answer:0},

{q:"Chemical formula of water?", options:["H2O","CO2","NaCl","O2"], answer:0},

{q:"Soap is made from?", options:["Fat + alkali","Acid + metal","Gas","Water"], answer:0},

{q:"Carbon dioxide formula?", options:["CO2","CO","H2O","O2"], answer:0}

]
},

{
section:"Science Section",
subject:"Biology",
questions:[

{q:"Cell is discovered by?", options:["Robert Hooke","Newton","Darwin","Bohr"], answer:0},

{q:"Human heart has how many chambers?", options:["4","2","3","5"], answer:0},

{q:"Plants prepare food by?", options:["Photosynthesis","Respiration","Digestion","Excretion"], answer:0},

{q:"Blood is purified in?", options:["Kidney","Liver","Heart","Lungs"], answer:0},

{q:"DNA full form?", options:["Deoxyribonucleic Acid","Dynamic Acid","Double Acid","None"], answer:0}

]
}

];

let score = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");

let currentSection = "";

quizData.forEach((data)=>{

    if(currentSection !== data.section){

        currentSection = data.section;

        let sectionTitle = document.createElement("h2");
        sectionTitle.classList.add("section-title");
        sectionTitle.innerText = currentSection;

        quiz.appendChild(sectionTitle);
    }

    let subjectTitle = document.createElement("h3");
    subjectTitle.classList.add("subject-title");
    subjectTitle.innerText = data.subject;

    quiz.appendChild(subjectTitle);

    data.questions.forEach((item,index)=>{

        let div = document.createElement("div");
        div.classList.add("question");

        let q = document.createElement("h4");
        q.innerText = (index+1)+". "+item.q;

        div.appendChild(q);

        item.options.forEach((opt,i)=>{

            let btn = document.createElement("div");

            btn.classList.add("option");

            btn.innerText = opt;

            btn.onclick = function(){

                if(div.classList.contains("answered")) return;

                div.classList.add("answered");

                if(i === item.answer){

                    btn.classList.add("correct");

                    score++;

                }else{

                    btn.classList.add("wrong");

                }

                div.querySelectorAll(".option")[item.answer]
                .classList.add("correct");
            };

            div.appendChild(btn);

        });

        quiz.appendChild(div);

    });

});

}

function showScore(){

document.getElementById("score").innerText =
"Your Score: " + score;

}

loadQuiz();

</script>

</body>
</html>
