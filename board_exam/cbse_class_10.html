<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBSE & BSEB Class 10 MCQ Quiz</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        margin:0;
        padding:20px;
    }

    .container{
        max-width:1000px;
        margin:auto;
        background:white;
        padding:20px;
        border-radius:10px;
    }

    h1{
        text-align:center;
        color:#333;
    }

    .subject{
        margin-top:40px;
        padding:20px;
        border:2px solid #ddd;
        border-radius:10px;
        background:#fafafa;
    }

    .subject h2{
        background:#2196F3;
        color:white;
        padding:10px;
        border-radius:5px;
    }

    .question{
        margin-top:20px;
        padding:10px;
        border-bottom:1px solid #ddd;
    }

    .option{
        display:block;
        padding:10px;
        margin:5px 0;
        border:1px solid #ccc;
        border-radius:5px;
        cursor:pointer;
        background:white;
    }

    .option:hover{
        background:#eee;
    }

    .correct{
        background:#4CAF50;
        color:white;
    }

    .wrong{
        background:#f44336;
        color:white;
    }

    button{
        padding:12px 20px;
        margin-top:20px;
        font-size:18px;
        background:#2196F3;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }

    #score{
        font-size:24px;
        margin-top:20px;
        text-align:center;
        color:#333;
    }
</style>
</head>

<body>

<div class="container">

<h1>CBSE Class 10 MCQ Quiz</h1>

<div id="quiz"></div>

<button onclick="showScore()">Submit Quiz</button>

<h2 id="score"></h2>

</div>

<script>

const quizData = [

{
subject:"Hindi",
questions:[
{
q:"'नेताजी का चश्मा' पाठ के लेखक कौन हैं?",
options:["स्वयं प्रकाश","प्रेमचंद","महादेवी वर्मा","हरिवंश राय बच्चन"],
answer:0
},
{
q:"'साखी' किसकी रचना है?",
options:["तुलसीदास","कबीरदास","सूरदास","रहीम"],
answer:1
},
{
q:"'राम-लक्ष्मण-परशुराम संवाद' किस ग्रंथ से लिया गया है?",
options:["रामचरितमानस","गीता","महाभारत","विनय पत्रिका"],
answer:0
},
{
q:"'बालगोबिन भगत' के लेखक कौन हैं?",
options:["यशपाल","रामवृक्ष बेनीपुरी","नागार्जुन","दिनकर"],
answer:1
},
{
q:"'उत्साह' कविता के कवि कौन हैं?",
options:["निराला","दिनकर","पंत","प्रसाद"],
answer:0
}
]
},

{
subject:"English",
questions:[
{
q:"Who wrote 'A Letter to God'?",
options:["G.L. Fuentes","Ruskin Bond","Robert Frost","James Herriot"],
answer:0
},
{
q:"What was Lencho waiting for?",
options:["Money","Rain","Food","Letter"],
answer:1
},
{
q:"Who is the poet of 'Dust of Snow'?",
options:["Robert Frost","Keats","Wordsworth","Whitman"],
answer:0
},
{
q:"What animal is in 'A Triumph of Surgery'?",
options:["Dog","Cat","Horse","Rabbit"],
answer:0
},
{
q:"What does Coorg famous for?",
options:["Tea","Coffee","Rice","Cotton"],
answer:1
}
]
},

{
subject:"Mathematics",
questions:[
{
q:"What is the value of π?",
options:["3.14","2.14","1.14","4.14"],
answer:0
},
{
q:"The zero of polynomial x² - 4 is:",
options:["2","-2","Both 2 and -2","0"],
answer:2
},
{
q:"What is the square root of 144?",
options:["10","11","12","13"],
answer:2
},
{
q:"Area of circle formula is:",
options:["πr²","2πr","πd","r²"],
answer:0
},
{
q:"What is 15% of 200?",
options:["20","25","30","35"],
answer:2
}
]
},

{
subject:"Science",
questions:[
{
q:"What is the chemical formula of water?",
options:["H2O","CO2","NaCl","O2"],
answer:0
},
{
q:"Which gas is essential for breathing?",
options:["Hydrogen","Oxygen","Nitrogen","Carbon dioxide"],
answer:1
},
{
q:"Who proposed the cell theory?",
options:["Newton","Einstein","Schleiden and Schwann","Bohr"],
answer:2
},
{
q:"What is the SI unit of force?",
options:["Joule","Pascal","Newton","Watt"],
answer:2
},
{
q:"Plants prepare food by:",
options:["Respiration","Photosynthesis","Digestion","Excretion"],
answer:1
}
]
},

{
subject:"Social Science",
questions:[
{
q:"Who was the first President of India?",
options:["Mahatma Gandhi","Rajendra Prasad","Nehru","Sardar Patel"],
answer:1
},
{
q:"What is the capital of Bihar?",
options:["Patna","Delhi","Ranchi","Lucknow"],
answer:0
},
{
q:"Who discovered sea route to India?",
options:["Columbus","Vasco da Gama","Magellan","Cook"],
answer:1
},
{
q:"In which year did India become independent?",
options:["1945","1946","1947","1950"],
answer:2
},
{
q:"Which is the largest democracy in the world?",
options:["USA","India","China","Russia"],
answer:1
}
]
}

];

let score = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");

quizData.forEach((subjectData, sIndex)=>{

    let subjectDiv = document.createElement("div");
    subjectDiv.classList.add("subject");

    let heading = document.createElement("h2");
    heading.innerText = subjectData.subject;
    subjectDiv.appendChild(heading);

    subjectData.questions.forEach((item, qIndex)=>{

        let div = document.createElement("div");
        div.classList.add("question");

        let q = document.createElement("h4");
        q.innerText = (qIndex+1)+". "+item.q;

        div.appendChild(q);

        item.options.forEach((opt, i)=>{

            let btn = document.createElement("div");

            btn.classList.add("option");

            btn.innerText = opt;

            btn.onclick = function(){

                if(div.classList.contains("answered")) return;

                div.classList.add("answered");

                if(i === item.answer){

                    btn.classList.add("correct");

                    score++;

                }else{

                    btn.classList.add("wrong");

                }

                div.querySelectorAll(".option")[item.answer]
                .classList.add("correct");
            };

            div.appendChild(btn);

        });

        subjectDiv.appendChild(div);

    });

    quiz.appendChild(subjectDiv);

});

}

function showScore(){

document.getElementById("score").innerText =
"Your Score: " + score;

}

loadQuiz();

</script>

</body>
</html>
