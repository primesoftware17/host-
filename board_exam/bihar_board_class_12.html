<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 12 Stream Wise Quiz</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.quiz-container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    text-align:center;
    color:#333;
}

.section-title{
    background:#222;
    color:white;
    padding:12px;
    margin-top:40px;
    border-radius:5px;
}

.subject-title{
    background:#2196F3;
    color:white;
    padding:10px;
    margin-top:25px;
    border-radius:5px;
}

.question{
    margin-bottom:20px;
    padding:10px;
    border-bottom:1px solid #ccc;
}

.option{
    display:block;
    padding:10px;
    margin:5px 0;
    border:1px solid #ccc;
    border-radius:5px;
    cursor:pointer;
    background:#fafafa;
}

.option:hover{
    background:#eee;
}

.correct{
    background:#4CAF50;
    color:white;
}

.wrong{
    background:#f44336;
    color:white;
}

button{
    padding:12px 25px;
    font-size:18px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:20px;
}

#score{
    margin-top:20px;
    font-size:24px;
    color:#333;
    text-align:center;
}

</style>
</head>

<body>

<div class="quiz-container">

<h1>Class 12 Stream Wise MCQ Quiz</h1>

<div id="quiz"></div>

<button onclick="showScore()">Submit Quiz</button>

<h2 id="score"></h2>

</div>

<script>

const quizData = [

/* ===================== COMPULSORY SUBJECTS ===================== */

{
section:"Compulsory Subjects",
subject:"Hindi",
questions:[

{q:"'आत्मपरिचय' कविता के कवि कौन हैं? / कवि?", options:["हरिवंश राय बच्चन","निराला","दिनकर","महादेवी"], answer:0},

{q:"'भक्तिन' पाठ की लेखिका कौन हैं? / लेखिका?", options:["महादेवी वर्मा","सुभद्रा कुमारी","मन्नू भंडारी","कृष्णा सोबती"], answer:0},

{q:"'काले मेघा पानी दे' किसकी रचना है? / लेखक?", options:["फणीश्वरनाथ रेणु","प्रेमचंद","दिनकर","निराला"], answer:0},

{q:"'उषा' कविता के कवि कौन हैं? / कवि?", options:["शमशेर बहादुर सिंह","दिनकर","पंत","निराला"], answer:0},

{q:"'बाजार दर्शन' के लेखक कौन हैं? / लेखक?", options:["हरिशंकर परसाई","प्रेमचंद","महादेवी","दिनकर"], answer:0}

]
},

{
section:"Compulsory Subjects",
subject:"English",
questions:[

{q:"Who wrote 'The Last Lesson'? / लेखक?", options:["Alphonse Daudet","Robert Frost","Whitman","Mulk Raj Anand"], answer:0},

{q:"Who was Franz? / फ्रांज कौन था?", options:["Student","Teacher","Farmer","Doctor"], answer:0},

{q:"The poem 'My Mother at Sixty Six' is written by? / कवयित्री?", options:["Kamala Das","Keats","Whitman","Frost"], answer:0},

{q:"What was the lost spring related to? / विषय?", options:["Child labour","War","Education","Sports"], answer:0},

{q:"Who wrote 'Deep Water'? / लेखक?", options:["William Douglas","Whitman","Daudet","Keats"], answer:0}

]
},

/* ===================== ARTS SECTION ===================== */

{
section:"Arts Section",
subject:"History",
questions:[

{q:"Who wrote Ain-i-Akbari? / लेखक?", options:["Abul Fazl","Akbar","Babur","Badauni"], answer:0},

{q:"Harappa civilization belongs to? / सभ्यता?", options:["Indus Valley","Vedic","Maurya","Gupta"], answer:0},

{q:"Who founded Mughal Empire? / संस्थापक?", options:["Babur","Akbar","Humayun","Shah Jahan"], answer:0},

{q:"Who was Mahatma Gandhi? / गांधीजी?", options:["Freedom fighter","Scientist","Doctor","King"], answer:0},

{q:"In which year India got independence? / स्वतंत्रता?", options:["1947","1942","1950","1930"], answer:0}

]
},

{
section:"Arts Section",
subject:"Political Science",
questions:[

{q:"UNO stands for? / पूरा नाम?", options:["United Nations Organization","Union National Office","United Office","None"], answer:0},

{q:"Who is called Father of Constitution? / संविधान निर्माता?", options:["Dr. B.R. Ambedkar","Gandhi","Nehru","Patel"], answer:0},

{q:"Democracy means? / लोकतंत्र?", options:["Rule by people","Rule by king","Rule by army","Rule by priest"], answer:0},

{q:"Indian Constitution came into force in? / लागू?", options:["1950","1947","1942","1960"], answer:0},

{q:"Lok Sabha members are elected for? / कार्यकाल?", options:["5 years","4 years","6 years","2 years"], answer:0}

]
},

{
section:"Arts Section",
subject:"Geography",
questions:[

{q:"Largest continent is? / सबसे बड़ा महाद्वीप?", options:["Asia","Africa","Europe","Australia"], answer:0},

{q:"Ganga river originates from? / उद्गम?", options:["Gangotri","Yamunotri","Kedarnath","Badrinath"], answer:0},

{q:"Which soil is best for cotton? / कपास?", options:["Black soil","Red soil","Alluvial","Laterite"], answer:0},

{q:"India is located in which hemisphere? / गोलार्ध?", options:["Northern","Southern","Western","Eastern"], answer:0},

{q:"Capital of Bihar? / राजधानी?", options:["Patna","Delhi","Lucknow","Ranchi"], answer:0}

]
},

/* ===================== COMMERCE SECTION ===================== */

{
section:"Commerce Section",
subject:"Accountancy",
questions:[

{q:"Accounting records? / लेखांकन?", options:["Financial transactions","Weather","Politics","Sports"], answer:0},

{q:"Debit the receiver means? / नियम?", options:["Golden rule","Silver rule","Cash rule","Trade rule"], answer:0},

{q:"Journal is called? / जर्नल?", options:["Book of original entry","Ledger","Cash book","Balance sheet"], answer:0},

{q:"Balance sheet shows? / दर्शाता?", options:["Financial position","Profit only","Loss only","Sales"], answer:0},

{q:"Capital means? / पूंजी?", options:["Owner investment","Loan","Expense","Sales"], answer:0}

]
},

{
section:"Commerce Section",
subject:"Business Studies",
questions:[

{q:"Management means? / प्रबंधन?", options:["Getting work done","Sleeping","Entertainment","Travel"], answer:0},

{q:"Who is father of management? / जनक?", options:["F.W. Taylor","Newton","Einstein","Gandhi"], answer:0},

{q:"Planning is? / योजना?", options:["Primary function","Secondary","No function","Last function"], answer:0},

{q:"Business aims at? / उद्देश्य?", options:["Profit","Loss","Fight","War"], answer:0},

{q:"Marketing helps in? / विपणन?", options:["Selling goods","Farming","Teaching","Driving"], answer:0}

]
},

{
section:"Commerce Section",
subject:"Economics",
questions:[

{q:"Economics studies? / अध्ययन?", options:["Human behaviour","Animals","Machines","Water"], answer:0},

{q:"Demand means? / मांग?", options:["Need backed by ability","Only wish","Only money","Only goods"], answer:0},

{q:"Inflation means? / मुद्रास्फीति?", options:["Rise in prices","Fall in prices","Rain","Profit"], answer:0},

{q:"National income means? / राष्ट्रीय आय?", options:["Total income","Tax","Import","Export"], answer:0},

{q:"Bank of India is? / RBI?", options:["Central bank","Private bank","Foreign bank","None"], answer:0}

]
},

/* ===================== SCIENCE SECTION ===================== */

{
section:"Science Section",
subject:"Physics",
questions:[

{q:"SI unit of force? / मात्रक?", options:["Newton","Joule","Pascal","Watt"], answer:0},

{q:"Speed of light is? / प्रकाश गति?", options:["3×10^8 m/s","3×10^6","3×10^5","3×10^2"], answer:0},

{q:"Who discovered gravity? / गुरुत्वाकर्षण?", options:["Newton","Einstein","Galileo","Bohr"], answer:0},

{q:"Electric current measured by? / माप?", options:["Ammeter","Voltmeter","Barometer","Thermometer"], answer:0},

{q:"Unit of power? / शक्ति?", options:["Watt","Newton","Joule","Ampere"], answer:0}

]
},

{
section:"Science Section",
subject:"Chemistry",
questions:[

{q:"Organic chemistry studies? / अध्ययन?", options:["Carbon compounds","Metals","Water","Gas"], answer:0},

{q:"pH value of acid is? / pH?", options:["Less than 7","More than 7","7","14"], answer:0},

{q:"Chemical formula of water? / सूत्र?", options:["H2O","CO2","NaCl","O2"], answer:0},

{q:"Soap is made from? / साबुन?", options:["Fat + alkali","Acid + metal","Gas","Water"], answer:0},

{q:"Carbon dioxide formula? / सूत्र?", options:["CO2","CO","H2O","O2"], answer:0}

]
},

{
section:"Science Section",
subject:"Biology",
questions:[

{q:"Cell is discovered by? / खोज?", options:["Robert Hooke","Newton","Darwin","Bohr"], answer:0},

{q:"Human heart has how many chambers? / कक्ष?", options:["4","2","3","5"], answer:0},

{q:"Plants prepare food by? / भोजन?", options:["Photosynthesis","Respiration","Digestion","Excretion"], answer:0},

{q:"Blood is purified in? / शुद्ध?", options:["Kidney","Liver","Heart","Lungs"], answer:0},

{q:"DNA full form? / पूरा नाम?", options:["Deoxyribonucleic Acid","Dynamic Acid","Double Acid","None"], answer:0}

]
}

];

let score = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");

let currentSection = "";

quizData.forEach((data)=>{

    if(currentSection !== data.section){

        currentSection = data.section;

        let sectionTitle = document.createElement("h2");
        sectionTitle.classList.add("section-title");
        sectionTitle.innerText = currentSection;

        quiz.appendChild(sectionTitle);
    }

    let subjectTitle = document.createElement("h3");
    subjectTitle.classList.add("subject-title");
    subjectTitle.innerText = data.subject;

    quiz.appendChild(subjectTitle);

    data.questions.forEach((item,index)=>{

        let div = document.createElement("div");
        div.classList.add("question");

        let q = document.createElement("h4");
        q.innerText = (index+1)+". "+item.q;

        div.appendChild(q);

        item.options.forEach((opt,i)=>{

            let btn = document.createElement("div");

            btn.classList.add("option");

            btn.innerText = opt;

            btn.onclick = function(){

                if(div.classList.contains("answered")) return;

                div.classList.add("answered");

                if(i === item.answer){

                    btn.classList.add("correct");

                    score++;

                }else{

                    btn.classList.add("wrong");

                }

                div.querySelectorAll(".option")[item.answer]
                .classList.add("correct");
            };

            div.appendChild(btn);

        });

        quiz.appendChild(div);

    });

});

}

function showScore(){

document.getElementById("score").innerText =
"Your Score: " + score;

}

loadQuiz();

</script>

</body>
</html>
