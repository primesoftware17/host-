<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Railway Exam MCQ Quiz</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.quiz-container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    text-align:center;
    color:#333;
}

.section-title{
    background:#222;
    color:white;
    padding:12px;
    margin-top:40px;
    border-radius:5px;
}

.subject-title{
    background:#2196F3;
    color:white;
    padding:10px;
    margin-top:25px;
    border-radius:5px;
}

.question{
    margin-bottom:20px;
    padding:10px;
    border-bottom:1px solid #ccc;
}

.option{
    display:block;
    padding:10px;
    margin:5px 0;
    border:1px solid #ccc;
    border-radius:5px;
    cursor:pointer;
    background:#fafafa;
}

.option:hover{
    background:#eee;
}

.correct{
    background:#4CAF50;
    color:white;
}

.wrong{
    background:#f44336;
    color:white;
}

button{
    padding:12px 25px;
    font-size:18px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:20px;
}

#score{
    margin-top:20px;
    font-size:24px;
    color:#333;
    text-align:center;
}

</style>
</head>

<body>

<div class="quiz-container">

<h1>Railway Exam MCQ Quiz</h1>

<div id="quiz"></div>

<button onclick="showScore()">Submit Quiz</button>

<h2 id="score"></h2>

</div>

<script>

const quizData = [

/* ================= STATION MASTER ================= */

{
section:"Station Master",
subject:"General Awareness",
questions:[

{q:"Indian Railways headquarters is located at?", options:["New Delhi","Mumbai","Kolkata","Chennai"], answer:0},

{q:"National animal of India?", options:["Tiger","Lion","Elephant","Leopard"], answer:0},

{q:"Who is known as Father of Nation?", options:["Mahatma Gandhi","Nehru","Patel","Subhash Bose"], answer:0},

{q:"Capital of Bihar?", options:["Patna","Delhi","Lucknow","Ranchi"], answer:0},

{q:"Largest state of India?", options:["Rajasthan","UP","Bihar","Punjab"], answer:0}

]
},

{
section:"Station Master",
subject:"Reasoning",
questions:[

{q:"Find next number: 2,4,6,8,?", options:["10","12","14","16"], answer:0},

{q:"Odd one out?", options:["Apple","Banana","Car","Mango"], answer:2},

{q:"If A=1, then D=?", options:["4","5","6","7"], answer:0},

{q:"Complete series: 5,10,15,?", options:["20","25","30","35"], answer:0},

{q:"Mirror image of TOP?", options:["POT","TOP","OPT","TPO"], answer:0}

]
},

{
section:"Station Master",
subject:"Mathematics",
questions:[

{q:"25 × 4 = ?", options:["100","90","80","120"], answer:0},

{q:"Square root of 144?", options:["12","11","10","13"], answer:0},

{q:"20% of 500?", options:["100","50","80","120"], answer:0},

{q:"Area of circle formula?", options:["πr²","2πr","r²","πd"], answer:0},

{q:"10² = ?", options:["100","10","20","50"], answer:0}

]
},

{
section:"Station Master",
subject:"English",
questions:[

{q:"Synonym of Happy?", options:["Joyful","Sad","Angry","Cry"], answer:0},

{q:"Antonym of Dark?", options:["Light","Black","Night","Shade"], answer:0},

{q:"Choose correct spelling?", options:["Beautiful","Beautifull","Beautifal","Beautifool"], answer:0},

{q:"He ___ going to school.", options:["is","are","am","be"], answer:0},

{q:"Plural of Child?", options:["Children","Childs","Childes","Childrens"], answer:0}

]
},

/* ================= ASSISTANT LOCO PILOT ================= */

{
section:"Assistant Loco Pilot (ALP)",
subject:"General Science",
questions:[

{q:"SI unit of force?", options:["Newton","Joule","Watt","Pascal"], answer:0},

{q:"Speed of light is?", options:["3×10^8 m/s","3×10^6","3×10^5","3×10^2"], answer:0},

{q:"Chemical formula of water?", options:["H2O","CO2","NaCl","O2"], answer:0},

{q:"Which gas is essential for breathing?", options:["Oxygen","Hydrogen","Nitrogen","CO2"], answer:0},

{q:"Unit of power?", options:["Watt","Newton","Joule","Ampere"], answer:0}

]
},

{
section:"Assistant Loco Pilot (ALP)",
subject:"Reasoning",
questions:[

{q:"Find next: 1,2,3,4,?", options:["5","6","7","8"], answer:0},

{q:"Odd one out?", options:["Pen","Book","Chair","Pencil"], answer:2},

{q:"A=1 then C=?", options:["3","4","5","6"], answer:0},

{q:"Complete series: 2,4,8,?", options:["16","14","12","10"], answer:0},

{q:"Mirror image of GOD?", options:["DOG","GOD","ODG","DGO"], answer:0}

]
},

{
section:"Assistant Loco Pilot (ALP)",
subject:"Mathematics",
questions:[

{q:"50 ÷ 5 = ?", options:["10","15","20","25"], answer:0},

{q:"12 × 12 = ?", options:["144","124","134","154"], answer:0},

{q:"Half of 200?", options:["100","50","150","75"], answer:0},

{q:"25% of 100?", options:["25","20","15","10"], answer:0},

{q:"7 × 8 = ?", options:["56","48","64","72"], answer:0}

]
},

{
section:"Assistant Loco Pilot (ALP)",
subject:"Technical Awareness",
questions:[

{q:"Battery stores?", options:["Electrical energy","Water","Heat","Air"], answer:0},

{q:"Which device measures current?", options:["Ammeter","Voltmeter","Barometer","Thermometer"], answer:0},

{q:"Current is measured in?", options:["Ampere","Volt","Watt","Newton"], answer:0},

{q:"Electric bulb converts electricity into?", options:["Light","Water","Air","Gas"], answer:0},

{q:"Motor converts electrical energy into?", options:["Mechanical energy","Heat","Light","Chemical"], answer:0}

]
}

];

let score = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");

let currentSection = "";

quizData.forEach((data)=>{

    if(currentSection !== data.section){

        currentSection = data.section;

        let sectionTitle = document.createElement("h2");
        sectionTitle.classList.add("section-title");
        sectionTitle.innerText = currentSection;

        quiz.appendChild(sectionTitle);
    }

    let subjectTitle = document.createElement("h3");
    subjectTitle.classList.add("subject-title");
    subjectTitle.innerText = data.subject;

    quiz.appendChild(subjectTitle);

    data.questions.forEach((item,index)=>{

        let div = document.createElement("div");
        div.classList.add("question");

        let q = document.createElement("h4");
        q.innerText = (index+1)+". "+item.q;

        div.appendChild(q);

        item.options.forEach((opt,i)=>{

            let btn = document.createElement("div");

            btn.classList.add("option");

            btn.innerText = opt;

            btn.onclick = function(){

                if(div.classList.contains("answered")) return;

                div.classList.add("answered");

                if(i === item.answer){

                    btn.classList.add("correct");

                    score++;

                }else{

                    btn.classList.add("wrong");

                }

                div.querySelectorAll(".option")[item.answer]
                .classList.add("correct");
            };

            div.appendChild(btn);

        });

        quiz.appendChild(div);

    });

});

}

function showScore(){

document.getElementById("score").innerText =
"Your Score: " + score;

}

loadQuiz();

</script>

</body>
</html>
