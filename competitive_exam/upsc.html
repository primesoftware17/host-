<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSC MCQ Quiz</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.quiz-container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    text-align:center;
    color:#333;
}

.section-title{
    background:#222;
    color:white;
    padding:12px;
    margin-top:40px;
    border-radius:5px;
}

.subject-title{
    background:#2196F3;
    color:white;
    padding:10px;
    margin-top:25px;
    border-radius:5px;
}

.question{
    margin-bottom:20px;
    padding:10px;
    border-bottom:1px solid #ccc;
}

.option{
    display:block;
    padding:10px;
    margin:5px 0;
    border:1px solid #ccc;
    border-radius:5px;
    cursor:pointer;
    background:#fafafa;
}

.option:hover{
    background:#eee;
}

.correct{
    background:#4CAF50;
    color:white;
}

.wrong{
    background:#f44336;
    color:white;
}

button{
    padding:12px 25px;
    font-size:18px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:20px;
}

#score{
    margin-top:20px;
    font-size:24px;
    color:#333;
    text-align:center;
}

</style>
</head>

<body>

<div class="quiz-container">

<h1>UPSC Prelims MCQ Quiz</h1>

<div id="quiz"></div>

<button onclick="showScore()">Submit Quiz</button>

<h2 id="score"></h2>

</div>

<script>

const quizData = [

/* ================= POLITY ================= */
{
section:"Polity",
subject:"Indian Constitution",
questions:[
{q:"Who is called Father of Indian Constitution?", options:["Dr. B.R. Ambedkar","Mahatma Gandhi","Nehru","Patel"], answer:0},
{q:"Constitution of India came into force in?", options:["1950","1947","1942","1960"], answer:0},
{q:"Indian Parliament consists of?", options:["President + Lok Sabha + Rajya Sabha","Only Lok Sabha","Only Rajya Sabha","Supreme Court"], answer:0},
{q:"Fundamental Rights are in which part?", options:["Part III","Part IV","Part I","Part II"], answer:0},
{q:"Lok Sabha members are elected for?", options:["5 years","4 years","6 years","3 years"], answer:0}
]
},

/* ================= HISTORY ================= */
{
section:"History",
subject:"Ancient & Modern India",
questions:[
{q:"Who wrote Ain-i-Akbari?", options:["Abul Fazl","Akbar","Babur","Badauni"], answer:0},
{q:"Harappa civilization belongs to?", options:["Indus Valley","Vedic","Maurya","Gupta"], answer:0},
{q:"First Battle of Panipat was fought in?", options:["1526","1857","1764","1947"], answer:0},
{q:"Who founded Mughal Empire?", options:["Babur","Akbar","Humayun","Shah Jahan"], answer:0},
{q:"Quit India Movement launched in?", options:["1942","1930","1920","1950"], answer:0}
]
},

/* ================= GEOGRAPHY ================= */
{
section:"Geography",
subject:"Physical Geography",
questions:[
{q:"Largest continent?", options:["Asia","Africa","Europe","Australia"], answer:0},
{q:"Ganga originates from?", options:["Gangotri","Yamunotri","Kedarnath","Badrinath"], answer:0},
{q:"Hottest planet?", options:["Venus","Mars","Earth","Mercury"], answer:0},
{q:"Earth rotates in?", options:["24 hours","12 hours","48 hours","7 days"], answer:0},
{q:"Capital of India?", options:["New Delhi","Mumbai","Kolkata","Chennai"], answer:0}
]
},

/* ================= ECONOMICS ================= */
{
section:"Economics",
subject:"Indian Economy",
questions:[
{q:"RBI stands for?", options:["Reserve Bank of India","Revenue Bank of India","Regional Bank","Rural Bank of India"], answer:0},
{q:"Inflation means?", options:["Rise in prices","Fall in prices","No change","Profit"], answer:0},
{q:"GDP stands for?", options:["Gross Domestic Product","General Development Plan","Global Domestic Policy","Gross Demand Product"], answer:0},
{q:"Bank rate is decided by?", options:["RBI","SEBI","Government","Supreme Court"], answer:0},
{q:"Currency of India?", options:["Rupee","Dollar","Euro","Yen"], answer:0}
]
},

/* ================= SCIENCE ================= */
{
section:"Science & Technology",
subject:"General Science",
questions:[
{q:"Chemical formula of water?", options:["H2O","CO2","NaCl","O2"], answer:0},
{q:"Speed of light is?", options:["3×10^8 m/s","3×10^6","3×10^5","3×10^2"], answer:0},
{q:"Human heart has how many chambers?", options:["4","2","3","5"], answer:0},
{q:"Who discovered gravity?", options:["Newton","Einstein","Galileo","Tesla"], answer:0},
{q:"Vitamin C deficiency causes?", options:["Scurvy","Rickets","Night blindness","Anemia"], answer:0}
]
},

/* ================= CURRENT AFFAIRS ================= */
{
section:"Current Affairs",
subject:"India & World",
questions:[
{q:"UNO headquarters is in?", options:["New York","London","Paris","Geneva"], answer:0},
{q:"India became member of UNO in?", options:["1945","1947","1950","1962"], answer:0},
{q:"ISRO is related to?", options:["Space Research","Military","Banking","Education"], answer:0},
{q:"Indian Prime Minister is head of?", options:["Government","Judiciary","Election Commission","Army"], answer:0},
{q:"President of India is?", options:["Head of State","Head of Government","Army Chief","Judge"], answer:0}
]
}

];

let score = 0;

function loadQuiz(){

const quiz = document.getElementById("quiz");
let currentSection = "";

quizData.forEach((data)=>{

    if(currentSection !== data.section){
        currentSection = data.section;

        let sectionTitle = document.createElement("h2");
        sectionTitle.classList.add("section-title");
        sectionTitle.innerText = currentSection;
        quiz.appendChild(sectionTitle);
    }

    let subjectTitle = document.createElement("h3");
    subjectTitle.classList.add("subject-title");
    subjectTitle.innerText = data.subject;
    quiz.appendChild(subjectTitle);

    data.questions.forEach((item)=>{

        let div = document.createElement("div");
        div.classList.add("question");
        div.setAttribute("data-answer", item.answer);

        let q = document.createElement("h4");
        q.innerText = item.q;
        div.appendChild(q);

        item.options.forEach((opt,i)=>{
            let btn = document.createElement("div");
            btn.classList.add("option");
            btn.innerText = opt;
            btn.setAttribute("data-index", i);
            div.appendChild(btn);
        });

        quiz.appendChild(div);
    });
});

/* ⚡ ONE CLICK LISTENER ONLY (FAST) */
quiz.addEventListener("click", function(e){

    if(!e.target.classList.contains("option")) return;

    let option = e.target;
    let question = option.parentElement;

    if(question.classList.contains("answered")) return;

    question.classList.add("answered");

    let correct = parseInt(question.getAttribute("data-answer"));
    let selected = parseInt(option.getAttribute("data-index"));

    let options = question.querySelectorAll(".option");

    if(selected === correct){
        option.classList.add("correct");
        score++;
    }else{
        option.classList.add("wrong");
    }

    options[correct].classList.add("correct");
});

}

function showScore(){
document.getElementById("score").innerText =
"Your Score: " + score;
}

loadQuiz();

</script>

</body>
</html>
