<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Motion Quiz</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
    }

    .quiz-container {
        max-width: 850px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
    }

    .question {
        margin-bottom: 15px;
    }

    .option {
        display: block;
        padding: 10px;
        margin: 5px 0;
        border: 1px solid #ccc;
        cursor: pointer;
        border-radius: 5px;
    }

    .correct {
        background-color: #4CAF50;
        color: white;
    }

    .wrong {
        background-color: #f44336;
        color: white;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 20px;
    }
</style>
</head>

<body>

<div class="quiz-container">

    <h2>Science Quiz (30 Questions - Motion)</h2>

    <div id="quiz"></div>

    <button onclick="showScore()">Submit</button>

    <h3 id="score"></h3>

</div>

<script>

const questions = [

{q:"What is motion? / गति क्या है?", options:["Change in position","Change in color","Change in mass","Change in shape"], answer:0},

{q:"SI unit of speed is?", options:["m/s","kg","meter","second"], answer:0},

{q:"Speed = ?", options:["distance/time","time/distance","distance × time","mass/time"], answer:0},

{q:"Uniform motion means?", options:["Constant speed","Changing speed","No motion","Random motion"], answer:0},

{q:"Non-uniform motion means?", options:["Constant speed","Changing speed","No motion","Circular motion"], answer:1},

{q:"SI unit of distance is?", options:["kg","meter","second","m/s"], answer:1},

{q:"What is velocity?", options:["Speed with direction","Only speed","Only direction","Mass × speed"], answer:0},

{q:"Acceleration is change in?", options:["speed","mass","distance","time"], answer:0},

{q:"SI unit of acceleration is?", options:["m/s²","m/s","kg","meter"], answer:0},

{q:"Rest means?", options:["No change in position","Fast motion","Slow motion","Circular motion"], answer:0},

{q:"Distance is a?", options:["scalar quantity","vector quantity","force","energy"], answer:0},

{q:"Displacement is a?", options:["scalar","vector","mass","time"], answer:1},

{q:"Speed is always?", options:["negative","positive","zero only","infinite"], answer:1},

{q:"Velocity can be?", options:["negative","positive","both","none"], answer:2},

{q:"Which is example of uniform motion?", options:["Car at constant speed","Falling stone","Bus in traffic","Running athlete"], answer:0},

{q:"Acceleration due to gravity is?", options:["9.8 m/s²","10 m/s","5 m/s²","1 m/s²"], answer:0},

{q:"What is time unit?", options:["meter","second","kg","m/s"], answer:1},

{q:"Graph of motion shows?", options:["speed/time relation","mass/volume","force/energy","color change"], answer:0},

{q:"Distance is always?", options:["zero or positive","negative","vector only","directional"], answer:0},

{q:"Motion in straight line is called?", options:["linear motion","circular motion","random motion","rotational motion"], answer:0},

{q:"Circular motion example?", options:["Earth around sun","Car on straight road","Falling stone","Train on track"], answer:0},

{q:"Speedometer measures?", options:["speed","distance","time","force"], answer:0},

{q:"Odometer measures?", options:["distance","speed","time","acceleration"], answer:0},

{q:"Velocity = ?", options:["displacement/time","distance/time","mass/time","force/time"], answer:0},

{q:"If speed increases, motion is?", options:["accelerated","uniform","rest","zero"], answer:0},

{q:"If speed is constant, acceleration is?", options:["0","1","10","infinite"], answer:0},

{q:"Motion in a circle is?", options:["circular motion","linear motion","random motion","rest"], answer:0},

{q:"SI unit of velocity is?", options:["m/s","kg","meter","second"], answer:0},

{q:"A body at rest has speed?", options:["0","1","10","infinite"], answer:0},

{q:"Change in position per unit time is?", options:["speed","mass","force","energy"], answer:0}

];

let score = 0;

function loadQuiz(){

    const quiz = document.getElementById("quiz");

    questions.forEach((item, index)=>{

        let div = document.createElement("div");

        div.classList.add("question");

        let q = document.createElement("h4");

        q.innerText = (index + 1) + ". " + item.q;

        div.appendChild(q);

        item.options.forEach((opt, i)=>{

            let btn = document.createElement("div");

            btn.classList.add("option");

            btn.innerText = opt;

            btn.onclick = function(){

                if(div.classList.contains("answered")) return;

                div.classList.add("answered");

                if(i === item.answer){

                    btn.classList.add("correct");
                    score++;

                } else {

                    btn.classList.add("wrong");
                }

                div.querySelectorAll(".option")[item.answer]
                .classList.add("correct");

            };

            div.appendChild(btn);

        });

        quiz.appendChild(div);

    });

}

function showScore(){

    document.getElementById("score").innerText =
    "Your Score: " + score + " / " + questions.length;

}

loadQuiz();

</script>

</body>
</html>
