<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Probability Quiz</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
    }

    .quiz-container {
        max-width: 850px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
    }

    .question {
        margin-bottom: 15px;
    }

    .option {
        display: block;
        padding: 10px;
        margin: 5px 0;
        border: 1px solid #ccc;
        cursor: pointer;
        border-radius: 5px;
    }

    .correct {
        background-color: #4CAF50;
        color: white;
    }

    .wrong {
        background-color: #f44336;
        color: white;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 20px;
    }
</style>
</head>

<body>

<div class="quiz-container">

    <h2>Mathematics Quiz (30 Questions - Probability)</h2>

    <div id="quiz"></div>

    <button onclick="showScore()">Submit</button>

    <h3 id="score"></h3>

</div>

<script>

const questions = [

{q:"Probability of a sure event is?", options:["0","1","1/2","2"], answer:1},

{q:"Probability of an impossible event is?", options:["0","1","1/2","2"], answer:0},

{q:"Probability always lies between?", options:["-1 to 1","0 to 1","1 to 2","0 to 2"], answer:1},

{q:"If a die is thrown, probability of getting 6 is?", options:["1/6","1/3","1/2","1"], answer:0},

{q:"If a coin is tossed, probability of head is?", options:["0","1","1/2","2"], answer:2},

{q:"If a coin is tossed, probability of tail is?", options:["0","1/2","1","2"], answer:2},

{q:"Total outcomes of a dice?", options:["5","6","7","8"], answer:1},

{q:"Probability formula is?", options:["Favourable / Total","Total / Favourable","Favourable × Total","Total - Favourable"], answer:0},

{q:"Event means?", options:["Outcome","Experiment result","Both","None"], answer:2},

{q:"Impossible event probability?", options:["0","1","-1","2"], answer:0},

{q:"Sure event probability?", options:["0","1","1/2","-1"], answer:1},

{q:"If dice shows even number, probability?", options:["1/2","1/3","2/3","1"], answer:0},

{q:"Total faces of a die?", options:["4","5","6","7"], answer:2},

{q:"Probability of getting odd number on dice?", options:["1/2","1/3","2/3","1"], answer:0},

{q:"If cards are drawn, probability range is?", options:["0 to 1","1 to 2","-1 to 1","0 to 2"], answer:0},

{q:"Probability of getting 7 on dice?", options:["0","1","1/6","1/3"], answer:0},

{q:"If a coin is tossed twice, outcomes?", options:["2","3","4","5"], answer:2},

{q:"Head on coin is?", options:["Event","Outcome","Experiment","None"], answer:1},

{q:"Tail on coin is?", options:["Event","Outcome","Experiment","None"], answer:1},

{q:"Probability of all events is always?", options:["< 0","> 1","between 0 and 1","= 2"], answer:2},

{q:"Sample space means?", options:["All outcomes","Some outcomes","One outcome","No outcome"], answer:0},

{q:"If die shows 1, probability?", options:["1/6","1/3","1/2","1"], answer:0},

{q:"Probability of getting number > 6 on dice?", options:["0","1","1/6","1/3"], answer:0},

{q:"Number of outcomes in coin toss?", options:["1","2","3","4"], answer:1},

{q:"Probability is always?", options:["Negative","Positive","Zero only","None"], answer:1},

{q:"Event not happening probability is?", options:["0","1","1/2","2"], answer:0},

{q:"Probability of getting 1 or 2 on dice?", options:["1/3","1/2","2/3","1"], answer:0},

{q:"If dice is fair, each outcome probability?", options:["1/6","1/3","1/2","1"], answer:0},

{q:"Certain event probability?", options:["0","1","-1","2"], answer:1},

{q:"Uncertain event probability?", options:["0 or 1","between 0 and 1","only 1","only 0"], answer:1}

];

let score = 0;

function loadQuiz(){

    const quiz = document.getElementById("quiz");

    questions.forEach((item, index)=>{

        let div = document.createElement("div");

        div.classList.add("question");

        let q = document.createElement("h4");

        q.innerText = (index + 1) + ". " + item.q;

        div.appendChild(q);

        item.options.forEach((opt, i)=>{

            let btn = document.createElement("div");

            btn.classList.add("option");

            btn.innerText = opt;

            btn.onclick = function(){

                if(div.classList.contains("answered")) return;

                div.classList.add("answered");

                if(i === item.answer){

                    btn.classList.add("correct");
                    score++;

                } else {

                    btn.classList.add("wrong");
                }

                div.querySelectorAll(".option")[item.answer]
                .classList.add("correct");

            };

            div.appendChild(btn);

        });

        quiz.appendChild(div);

    });

}

function showScore(){

    document.getElementById("score").innerText =
    "Your Score: " + score + " / " + questions.length;

}

loadQuiz();

</script>

</body>
</html>
