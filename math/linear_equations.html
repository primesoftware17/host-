<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Linear Equations Quiz</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
    }

    .quiz-container {
        max-width: 850px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
    }

    .question {
        margin-bottom: 15px;
    }

    .option {
        display: block;
        padding: 10px;
        margin: 5px 0;
        border: 1px solid #ccc;
        cursor: pointer;
        border-radius: 5px;
    }

    .correct {
        background-color: #4CAF50;
        color: white;
    }

    .wrong {
        background-color: #f44336;
        color: white;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 20px;
    }
</style>
</head>

<body>

<div class="quiz-container">

    <h2>Mathematics Quiz (30 Questions - Linear Equations)</h2>

    <div id="quiz"></div>

    <button onclick="showScore()">Submit</button>

    <h3 id="score"></h3>

</div>

<script>

const questions = [

{q:"Solve: x + 5 = 10", options:["3","4","5","6"], answer:2},

{q:"Solve: 2x = 8", options:["2","3","4","5"], answer:2},

{q:"Solve: x - 3 = 7", options:["9","10","11","12"], answer:1},

{q:"Solve: 3x = 15", options:["3","4","5","6"], answer:2},

{q:"Solve: x/2 = 6", options:["10","11","12","13"], answer:2},

{q:"Solve: x + 10 = 25", options:["13","14","15","16"], answer:2},

{q:"Solve: 5x = 20", options:["2","3","4","5"], answer:2},

{q:"Solve: x - 8 = 2", options:["8","9","10","11"], answer:2},

{q:"Solve: 4x = 16", options:["2","3","4","5"], answer:2},

{q:"Solve: x + 7 = 14", options:["5","6","7","8"], answer:2},

{q:"Solve: 6x = 30", options:["3","4","5","6"], answer:2},

{q:"Solve: x - 5 = 0", options:["3","4","5","6"], answer:2},

{q:"Solve: 7x = 21", options:["2","3","4","5"], answer:1},

{q:"Solve: x + 9 = 18", options:["7","8","9","10"], answer:2},

{q:"Solve: 8x = 32", options:["2","3","4","5"], answer:2},

{q:"Solve: x - 4 = 6", options:["8","9","10","11"], answer:2},

{q:"Solve: 9x = 27", options:["2","3","4","5"], answer:1},

{q:"Solve: x + 3 = 12", options:["7","8","9","10"], answer:2},

{q:"Solve: 10x = 50", options:["3","4","5","6"], answer:2},

{q:"Solve: x - 2 = 8", options:["8","9","10","11"], answer:2},

{q:"Solve: 11x = 33", options:["2","3","4","5"], answer:1},

{q:"Solve: x + 6 = 15", options:["7","8","9","10"], answer:2},

{q:"Solve: 12x = 48", options:["2","3","4","5"], answer:2},

{q:"Solve: x - 9 = 1", options:["8","9","10","11"], answer:2},

{q:"Solve: 13x = 39", options:["2","3","4","5"], answer:1},

{q:"Solve: x + 8 = 20", options:["10","11","12","13"], answer:2},

{q:"Solve: 14x = 56", options:["2","3","4","5"], answer:2},

{q:"Solve: x - 7 = 3", options:["8","9","10","11"], answer:2},

{q:"Solve: 15x = 60", options:["2","3","4","5"], answer:2},

{q:"Solve: x + 4 = 11", options:["5","6","7","8"], answer:2}

];

let score = 0;

function loadQuiz(){

    const quiz = document.getElementById("quiz");

    questions.forEach((item, index)=>{

        let div = document.createElement("div");

        div.classList.add("question");

        let q = document.createElement("h4");

        q.innerText = (index + 1) + ". " + item.q;

        div.appendChild(q);

        item.options.forEach((opt, i)=>{

            let btn = document.createElement("div");

            btn.classList.add("option");

            btn.innerText = opt;

            btn.onclick = function(){

                if(div.classList.contains("answered")) return;

                div.classList.add("answered");

                if(i === item.answer){

                    btn.classList.add("correct");
                    score++;

                } else {

                    btn.classList.add("wrong");
                }

                div.querySelectorAll(".option")[item.answer]
                .classList.add("correct");

            };

            div.appendChild(btn);

        });

        quiz.appendChild(div);

    });

}

function showScore(){

    document.getElementById("score").innerText =
    "Your Score: " + score + " / " + questions.length;

}

loadQuiz();

</script>

</body>
</html>
