<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trigonometry Quiz</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
    }

    .quiz-container {
        max-width: 850px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
    }

    .question {
        margin-bottom: 15px;
    }

    .option {
        display: block;
        padding: 10px;
        margin: 5px 0;
        border: 1px solid #ccc;
        cursor: pointer;
        border-radius: 5px;
    }

    .correct {
        background-color: #4CAF50;
        color: white;
    }

    .wrong {
        background-color: #f44336;
        color: white;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 20px;
    }
</style>
</head>

<body>

<div class="quiz-container">

    <h2>Mathematics Quiz (30 Questions - Trigonometry)</h2>

    <div id="quiz"></div>

    <button onclick="showScore()">Submit</button>

    <h3 id="score"></h3>

</div>

<script>

const questions = [

{q:"sin 30° = ?", options:["1","1/2","√3/2","√2/2"], answer:1},

{q:"cos 60° = ?", options:["1","1/2","√3/2","0"], answer:1},

{q:"tan 45° = ?", options:["0","1","√3","2"], answer:1},

{q:"sin 90° = ?", options:["0","1","1/2","√3/2"], answer:1},

{q:"cos 0° = ?", options:["0","1","1/2","√3/2"], answer:1},

{q:"tan 0° = ?", options:["0","1","∞","√3"], answer:0},

{q:"sin 60° = ?", options:["1/2","√3/2","1","0"], answer:1},

{q:"cos 30° = ?", options:["√3/2","1/2","1","0"], answer:0},

{q:"tan 60° = ?", options:["1","√3","1/2","0"], answer:1},

{q:"sin²θ + cos²θ = ?", options:["0","1","2","θ"], answer:1},

{q:"1/cos θ = ?", options:["sin θ","tan θ","sec θ","cot θ"], answer:2},

{q:"1/sin θ = ?", options:["sec θ","cosec θ","tan θ","cot θ"], answer:1},

{q:"1/tan θ = ?", options:["cot θ","sec θ","sin θ","cos θ"], answer:0},

{q:"tan θ = ?", options:["sin θ / cos θ","cos θ / sin θ","sin θ × cos θ","1/sin θ"], answer:0},

{q:"cos θ = ?", options:["sin θ / tan θ","sin θ / cos θ","1/sec θ","tan θ / sin θ"], answer:2},

{q:"sin θ = ?", options:["cos θ / tan θ","1/cos θ","tan θ × cos θ","sec θ"], answer:2},

{q:"Which is not a trigonometric ratio?", options:["sin","cos","tan","log"], answer:3},

{q:"cot θ = ?", options:["sin/cos","cos/sin","1/sin","1/cos"], answer:1},

{q:"sec θ = ?", options:["1/sin θ","1/cos θ","sin θ","cos θ"], answer:1},

{q:"cosec θ = ?", options:["1/sin θ","1/cos θ","sin θ","cos θ"], answer:0},

{q:"Value of sin 0°?", options:["0","1","1/2","√3/2"], answer:0},

{q:"Value of cos 90°?", options:["0","1","1/2","√3/2"], answer:0},

{q:"Value of tan 30°?", options:["1","√3","1/√3","0"], answer:2},

{q:"Value of sin 45°?", options:["1/2","√2/2","√3/2","1"], answer:1},

{q:"Value of cos 45°?", options:["1/2","√2/2","√3/2","1"], answer:1},

{q:"Trigonometry deals with?", options:["Shapes","Angles and triangles","Numbers only","Graphs"], answer:1},

{q:"Right-angled triangle has?", options:["1 right angle","2 right angles","3 right angles","0 right angle"], answer:0},

{q:"Hypotenuse is opposite to?", options:["right angle","acute angle","obtuse angle","straight angle"], answer:0},

{q:"sin θ is ratio of?", options:["base/hypotenuse","perpendicular/hypotenuse","hypotenuse/base","base/perpendicular"], answer:1},

{q:"cos θ is ratio of?", options:["perpendicular/hypotenuse","base/hypotenuse","hypotenuse/base","perpendicular/base"], answer:1}

];

let score = 0;

function loadQuiz(){

    const quiz = document.getElementById("quiz");

    questions.forEach((item, index)=>{

        let div = document.createElement("div");

        div.classList.add("question");

        let q = document.createElement("h4");

        q.innerText = (index + 1) + ". " + item.q;

        div.appendChild(q);

        item.options.forEach((opt, i)=>{

            let btn = document.createElement("div");

            btn.classList.add("option");

            btn.innerText = opt;

            btn.onclick = function(){

                if(div.classList.contains("answered")) return;

                div.classList.add("answered");

                if(i === item.answer){

                    btn.classList.add("correct");
                    score++;

                } else {

                    btn.classList.add("wrong");
                }

                div.querySelectorAll(".option")[item.answer]
                .classList.add("correct");

            };

            div.appendChild(btn);

        });

        quiz.appendChild(div);

    });

}

function showScore(){

    document.getElementById("score").innerText =
    "Your Score: " + score + " / " + questions.length;

}

loadQuiz();

</script>

</body>
</html>
